name: Production Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  deploy:
    name: Deploy to Azure VM
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Execute remote SSH commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_HOST }}
          username: ${{ secrets.AZURE_USERNAME }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          script_stop: true # Fails the action if any script command fails
          script: |
            cd agentic-document-intelligence-platform
            
            # 1. Reset local state to avoid merge conflicts from manual edits
            git reset --hard HEAD
            git pull origin main
            
            # Navigate to the backend directory containing docker-compose.yml
            cd backend
            
            # 2. Shut down existing containers to free RAM for the build process
            sudo docker compose down
            
            # 3. Build and deploy
            sudo docker compose up --build -d
            
            # 4. Reclaim storage space
            sudo docker image prune -f