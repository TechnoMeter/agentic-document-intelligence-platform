name: Production Deployment

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '**.md' 
  workflow_dispatch:

jobs:
  deploy:
    name: Build Frontend & Deploy to Azure VM
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

      - name: Copy dist to backend folder on VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AZURE_HOST }}
          username: ${{ secrets.AZURE_USERNAME }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          source: "frontend/dist"
          target: "~/agentic-document-intelligence-platform/backend"
          overwrite: true

      - name: Deploy backend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_HOST }}
          username: ${{ secrets.AZURE_USERNAME }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          script_stop: true
          script: |
            cd ~/agentic-document-intelligence-platform
            git reset --hard HEAD
            git pull origin main
            cd backend
            if [ -d "frontend/dist" ]; then
              echo "Moving frontend/dist to backend/dist..."
              rm -rf dist
              mv frontend/dist dist
              rmdir frontend 2>/dev/null || true
            else
              echo "WARNING: frontend/dist not found. Using existing dist if present."
            fi
            sudo docker compose down
            sudo docker compose up --build -d
            sudo docker image prune -f
            echo "Deployment finished successfully."